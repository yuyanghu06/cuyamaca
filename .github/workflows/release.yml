name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Cuyamaca ${{ github.ref_name }}
          releaseBody: |
            ## Cuyamaca ${{ github.ref_name }}

            ### Installation
            - **macOS:** Download `Cuyamaca_${{ github.ref_name }}_aarch64.dmg` (Apple Silicon) or `Cuyamaca_${{ github.ref_name }}_x64.dmg` (Intel)
            - **Windows:** Download `Cuyamaca_${{ github.ref_name }}_x64-setup.exe`

            ### First Launch
            Cuyamaca will automatically detect and offer to install Ollama and arduino-cli if they are not present.

            ### What's Changed
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Cuyamaca ${{ github.ref_name }}
          releaseBody: |
            ## Cuyamaca ${{ github.ref_name }}

            ### Installation
            - **macOS:** Download `Cuyamaca_${{ github.ref_name }}_aarch64.dmg` (Apple Silicon) or `Cuyamaca_${{ github.ref_name }}_x64.dmg` (Intel)
            - **Windows:** Download `Cuyamaca_${{ github.ref_name }}_x64-setup.exe`

            ### First Launch
            Cuyamaca will automatically detect and offer to install Ollama and arduino-cli if they are not present.

            ### What's Changed
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          releaseDraft: true
          prerelease: false

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
              });
            }
